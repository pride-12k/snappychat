<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Snappy Chat</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div class="app-container">
    <!-- Main screen: Chat List / Requests -->
    <div class="screen main-screen" id="mainScreen">
      <div class="header">
        <h1>💬 Snappy</h1>
        <button id="requestsTabBtn" class="tab-btn">🙋 Requests</button>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search username...">
      </div>
      <div class="tabs">
        <button class="tab active" id="chatsTabBtn">Chats</button>
        <button class="tab" id="requestsTabBtn2">Friend Requests</button>
      </div>
      <div class="content">
        <div class="tab-pane active" id="chatsPane">
          <ul id="friendList" class="friend-list"></ul>
        </div>
        <div class="tab-pane" id="requestsPane">
          <ul id="requestList" class="request-list"></ul>
        </div>
      </div>
    </div>

    <!-- Chat screen (hidden initially) -->
    <div class="screen chat-screen hidden" id="chatScreen">
      <div class="chat-header">
        <button id="backBtn" class="back-btn">←</button>
        <img id="chatPartnerDp" src="" alt="">
        <div class="chat-partner-info">
          <span id="chatPartnerName"></span>
          <span id="typingIndicator" class="typing-indicator hidden">typing…</span>
        </div>
        <button id="ytSyncBtn" class="yt-sync-btn" title="Watch Together">▶️</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="chat-input">
        <button id="snapBtn" title="Send Photo">📷</button>
        <button id="gifBtn" title="Send GIF">GIF</button>
        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        <input type="file" id="snapFileInput" accept="image/*" style="display:none">
        <button id="sendBtn">➤</button>
      </div>
    </div>

    <!-- Snap Preview Modal -->
    <div class="modal hidden" id="snapModal">
      <div class="modal-content">
        <h3>📸 Send a Snap</h3>
        <div class="snap-preview">
          <img id="snapPreviewImg" src="" alt="">
          <canvas id="snapCanvas" style="display:none;"></canvas>
        </div>
        <div class="filter-buttons">
          <button data-filter="none">Original</button>
          <button data-filter="grayscale(100%)">B&W</button>
          <button data-filter="sepia(100%)">Sepia</button>
          <button data-filter="brightness(150%)">Bright</button>
          <button data-filter="blur(3px)">Blur</button>
        </div>
        <div class="snap-actions">
          <button id="sendSnapBtn">✉️ Send</button>
          <button id="closeSnapBtn">❌ Cancel</button>
        </div>
      </div>
    </div>

    <!-- GIF Modal -->
    <div class="modal hidden" id="gifModal">
      <div class="modal-content">
        <h3>🎞️ Search GIF</h3>
        <input type="text" id="gifSearchInput" placeholder="Search GIPHY...">
        <div id="gifResults" class="gif-grid"></div>
        <button id="closeGifBtn">❌ Close</button>
      </div>
    </div>

    <!-- YouTube Panel -->
    <div class="yt-panel hidden" id="ytPanel">
      <div class="yt-panel-header">
        <span>🎬 Watching Together</span>
        <button id="closeYtPanel">✖</button>
      </div>
      <div id="ytPlayerContainer"></div>
      <div class="yt-controls">
        <input type="text" id="ytVideoInput" placeholder="YouTube video ID or URL...">
        <button id="ytLoadBtn">Load</button>
      </div>
    </div>
  </div>

  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
