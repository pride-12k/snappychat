<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snappy Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card" id="authCard">
      <h1>💬 Snappy</h1>
      <div class="tabs">
        <button class="tab active" id="loginTab">Login</button>
        <button class="tab" id="signupTab">Sign Up</button>
      </div>
      <!-- Login form -->
      <form id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="Username" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
        <p class="error" id="loginError"></p>
      </form>
      <!-- Signup form (hidden initially) -->
      <form id="signupForm" class="auth-form hidden">
        <input type="text" id="signupUsername" placeholder="Username" required>
        <input type="password" id="signupPassword" placeholder="Password" required>
        <label for="dpInput" class="dp-label">📸 Profile Picture</label>
        <input type="file" id="dpInput" accept="image/*">
        <button type="submit">Sign Up</button>
        <p class="error" id="signupError"></p>
      </form>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
